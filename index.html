<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATHENA ESTIMATOR</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h2>ATHENA ESTIMATOR</h2>

<div class="container">
<div class="calculator">
<label>Area (SY)</label>
<input id="area" type="number" min="1">
<label>Depth (inches)</label>
<select id="depth">
            <option>1</option>
            <option>1.5</option>
            <option selected>2</option>
            <option>2.5</option>
            <option>3</option>
            <option>3.5</option>
            <option>4</option>
            <option>4.5</option>
            <option>5</option>
            <option>5.5</option>
            <option>6</option>
            <option>6.5</option>
            <option>7</option>
            <option>7.5</option>
            <option>8</option>
            <option>8.5</option>
            <option>9</option>
            <option>9.5</option>
            <option>10</option>
            <option>10.5</option>
            <option>11</option>
            <option>11.5</option>
            <option>12</option>
        </select>

        <label>Paver Type</label>
        <select id="paverType">
            <option value="little">Little paver</option>
            <option value="big">Big paver</option>
        </select>
        <label>Pave Tons Per Hour</label>
        <input id="tphRate" type="number">
        <label>Pave Price Per Hour</label>
        <input id="manualRate" type="number">
        <label>Add Extra Pave Hours</label>
        <input id="extraRate" type="number" value="0">
        <label>Price Per Ton</label>
        <input id="price" type="number" value="100">
        <label>Extra Tack in (SY)</label>
        <input id="tackArea" type="number" value="0">
        <label>Waste %</label>
        <input id="waste" type="number" value="5">
        <label>O&P %</label>
        <input id="markup" type="number" value="18">
        <button onclick="calculate()">Calculate</button>
    </div>
    <div class="resultsBox">
        <div id="result"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
